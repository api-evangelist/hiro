specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Hiro
providerId: hiro
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- Bitcoin
- Stacks
- sBTC
- Indexing
- Rate Limiting
description: Hiro APIs enforce per-IP and per-API-key rate limits. Authenticated keys
  get higher limits.
notes: Specific RPS depends on API and key tier; check docs.hiro.so for current values.
sources:
- https://docs.hiro.so/
responseCodes:
  throttled: 429
limits:
- name: Anonymous Per-IP
  scope: ip
  metric: requests_per_minute
  limit: 50
  notes: Default per-IP limit for unauthenticated requests.
- name: Authenticated Per-Key
  scope: api_key
  metric: requests_per_minute
  limit: 500
  notes: Higher limit with x-api-key header.
policies:
- name: Backoff Strategy
  description: Exponential backoff on 429.
- name: Use API Key
  description: Authenticate to lift IP-based limits.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
