naftiko: 1.0.0-alpha2
info:
  label: Stacks 3.0+ RPC API — Microblocks
  description: 'Stacks 3.0+ RPC API — Microblocks. 4 operations. Lead operation: Submit a microblock (Epoch 2.x). Self-contained
    Naftiko capability covering one Hiro business surface.'
  tags:
  - Hiro
  - Microblocks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HIRO_API_KEY: HIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: stacks-node-rpc-microblocks
    baseUri: http://localhost:20443
    description: Stacks 3.0+ RPC API — Microblocks business capability. Self-contained, no shared references.
    resources:
    - name: v2-microblocks
      path: /v2/microblocks
      operations:
      - name: postmicroblock
        method: POST
        description: Submit a microblock (Epoch 2.x)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-microblocks-confirmed-block_id
      path: /v2/microblocks/confirmed/{block_id}
      operations:
      - name: getconfirmedmicroblocks
        method: GET
        description: Get stream of confirmed microblocks (Epoch 2.x)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: block_id
          in: path
          type: string
          description: Hex-encoded Stacks block ID (64 characters)
          required: true
    - name: v2-microblocks-unconfirmed-block_id-seq
      path: /v2/microblocks/unconfirmed/{block_id}/{seq}
      operations:
      - name: getunconfirmedmicroblocks
        method: GET
        description: Get stream of unconfirmed microblocks (Epoch 2.x)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: block_id
          in: path
          type: string
          description: Hex-encoded parent block ID (64 characters)
          required: true
        - name: seq
          in: path
          type: integer
          description: Starting sequence number (0-65535)
          required: true
    - name: v2-microblocks-microblock_id
      path: /v2/microblocks/{microblock_id}
      operations:
      - name: getmicroblockbyid
        method: GET
        description: Get a stream of microblocks beginning
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: microblock_id
          in: path
          type: string
          description: Hex-encoded microblock hash (64 characters)
          required: true
    authentication:
      type: apikey
      key: authorization
      value: '{{env.HIRO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: stacks-node-rpc-microblocks-rest
    port: 8080
    description: REST adapter for Stacks 3.0+ RPC API — Microblocks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/microblocks
      name: v2-microblocks
      description: REST surface for v2-microblocks.
      operations:
      - method: POST
        name: postmicroblock
        description: Submit a microblock (Epoch 2.x)
        call: stacks-node-rpc-microblocks.postmicroblock
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/microblocks/confirmed/{block-id}
      name: v2-microblocks-confirmed-block-id
      description: REST surface for v2-microblocks-confirmed-block_id.
      operations:
      - method: GET
        name: getconfirmedmicroblocks
        description: Get stream of confirmed microblocks (Epoch 2.x)
        call: stacks-node-rpc-microblocks.getconfirmedmicroblocks
        with:
          block_id: rest.block_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/microblocks/unconfirmed/{block-id}/{seq}
      name: v2-microblocks-unconfirmed-block-id-seq
      description: REST surface for v2-microblocks-unconfirmed-block_id-seq.
      operations:
      - method: GET
        name: getunconfirmedmicroblocks
        description: Get stream of unconfirmed microblocks (Epoch 2.x)
        call: stacks-node-rpc-microblocks.getunconfirmedmicroblocks
        with:
          block_id: rest.block_id
          seq: rest.seq
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/microblocks/{microblock-id}
      name: v2-microblocks-microblock-id
      description: REST surface for v2-microblocks-microblock_id.
      operations:
      - method: GET
        name: getmicroblockbyid
        description: Get a stream of microblocks beginning
        call: stacks-node-rpc-microblocks.getmicroblockbyid
        with:
          microblock_id: rest.microblock_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stacks-node-rpc-microblocks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stacks 3.0+ RPC API — Microblocks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: submit-microblock-epoch-2-x
      description: Submit a microblock (Epoch 2.x)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stacks-node-rpc-microblocks.postmicroblock
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-stream-confirmed-microblocks-epoch
      description: Get stream of confirmed microblocks (Epoch 2.x)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stacks-node-rpc-microblocks.getconfirmedmicroblocks
      with:
        block_id: tools.block_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-stream-unconfirmed-microblocks-epoch
      description: Get stream of unconfirmed microblocks (Epoch 2.x)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stacks-node-rpc-microblocks.getunconfirmedmicroblocks
      with:
        block_id: tools.block_id
        seq: tools.seq
      outputParameters:
      - type: object
        mapping: $.
    - name: get-stream-microblocks-beginning
      description: Get a stream of microblocks beginning
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stacks-node-rpc-microblocks.getmicroblockbyid
      with:
        microblock_id: tools.microblock_id
      outputParameters:
      - type: object
        mapping: $.
