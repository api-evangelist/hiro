specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Hiro
providerId: hiro
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- Bitcoin
- Stacks
- sBTC
- Indexing
- Plans
description: Hiro APIs are free for low/medium volume. The Hiro Platform offers paid
  tiers for managed devnets and chainhooks.
notes: Public API endpoints have a free tier; high-volume usage requires an API key
  with rate-limit increases.
sources:
- https://www.hiro.so/
- https://docs.hiro.so/
plans:
- id: hiro-public-free
  name: Public Free
  type: free
  description: Free public access to Stacks API endpoints with documented rate limits.
  entries:
  - label: Public Access
    name: public_access
    type: included
    metric: requests
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Public Endpoints
  - name: Community Support
- id: hiro-platform-paid
  name: Hiro Platform
  type: paid
  description: Paid Platform plan with higher API rate limits, dedicated chainhook
    capacity, and managed devnets.
  entries:
  - label: Subscription
    name: subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: see hiro.so
    userMultiplied: false
  elements:
  - name: Higher Rate Limits
  - name: Managed Devnets
  - name: Hosted Chainhooks
- id: hiro-enterprise
  name: Enterprise
  type: enterprise
  description: Custom enterprise contracts with SLAs and dedicated support.
  entries:
  - label: Custom
    name: custom
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: SLAs
  - name: Dedicated Support
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
