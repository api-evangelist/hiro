naftiko: 1.0.0-alpha2
info:
  label: Stacks 3.0+ RPC API — Info
  description: 'Stacks 3.0+ RPC API — Info. 4 operations. Lead operation: Get Core API info. Self-contained Naftiko capability
    covering one Hiro business surface.'
  tags:
  - Hiro
  - Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HIRO_API_KEY: HIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: stacks-node-rpc-info
    baseUri: http://localhost:20443
    description: Stacks 3.0+ RPC API — Info business capability. Self-contained, no shared references.
    resources:
    - name: v2-info
      path: /v2/info
      operations:
      - name: getnodeinfo
        method: GET
        description: Get Core API info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-neighbors
      path: /v2/neighbors
      operations:
      - name: getnetworkpeers
        method: GET
        description: Get neighbor peers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-pox
      path: /v2/pox
      operations:
      - name: getpoxinfo
        method: GET
        description: Get PoX details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-health
      path: /v3/health
      operations:
      - name: getnodehealth
        method: GET
        description: Query the health of the node.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: authorization
      value: '{{env.HIRO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: stacks-node-rpc-info-rest
    port: 8080
    description: REST adapter for Stacks 3.0+ RPC API — Info. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/info
      name: v2-info
      description: REST surface for v2-info.
      operations:
      - method: GET
        name: getnodeinfo
        description: Get Core API info
        call: stacks-node-rpc-info.getnodeinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/neighbors
      name: v2-neighbors
      description: REST surface for v2-neighbors.
      operations:
      - method: GET
        name: getnetworkpeers
        description: Get neighbor peers
        call: stacks-node-rpc-info.getnetworkpeers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/pox
      name: v2-pox
      description: REST surface for v2-pox.
      operations:
      - method: GET
        name: getpoxinfo
        description: Get PoX details
        call: stacks-node-rpc-info.getpoxinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/health
      name: v3-health
      description: REST surface for v3-health.
      operations:
      - method: GET
        name: getnodehealth
        description: Query the health of the node.
        call: stacks-node-rpc-info.getnodehealth
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stacks-node-rpc-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stacks 3.0+ RPC API — Info. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-core-api-info
      description: Get Core API info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stacks-node-rpc-info.getnodeinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: get-neighbor-peers
      description: Get neighbor peers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stacks-node-rpc-info.getnetworkpeers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pox-details
      description: Get PoX details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stacks-node-rpc-info.getpoxinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: query-health-node
      description: Query the health of the node.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stacks-node-rpc-info.getnodehealth
      outputParameters:
      - type: object
        mapping: $.
