    baseURL: https://api.mainnet.hiro.so
    tags:
    - REST
    - Tokens
    - Metadata
    properties:
    - type: Documentation
      url: https://docs.hiro.so/stacks/token-metadata-api
    - type: OpenAPI
      url: openapi/hiro-token-metadata-api-openapi.yaml
  - aid: hiro:signer-metrics-api
    name: Hiro Signer Metrics API
